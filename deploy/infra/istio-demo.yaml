# Istio base installation for EKS
---
apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
---
# Enable automatic sidecar injection for your app namespace (e.g., logging)
apiVersion: v1
kind: Namespace
metadata:
  name: logging
  labels:
    istio-injection: enabled
---
# Istio Gateway for API traffic
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: log2incident-gateway
  namespace: logging
spec:
  selector:
    istio: ingressgateway # use Istio's default ingress gateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
---
# Example VirtualService for API Gateway
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: api-gateway
  namespace: logging
spec:
  hosts:
    - "*"
  gateways:
    - log2incident-gateway
  http:
    - match:
        - uri:
            prefix: "/"
      route:
        - destination:
            host: api-gateway.logging.svc.cluster.local
            port:
              number: 8000
---
# Example DestinationRule for API Gateway
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: api-gateway
  namespace: logging
spec:
  host: api-gateway.logging.svc.cluster.local
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
