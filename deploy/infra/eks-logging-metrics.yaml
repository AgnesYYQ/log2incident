---
# CloudWatch Agent ConfigMap for capturing container logs
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudwatch-agent-config
  namespace: logging
data:
  config.json: |
    {
      "logs": {
        "logs_collected": {
          "files": {
            "collect_list": [
              {
                "file_path": "/var/log/containers/*.log",
                "log_group_name": "/aws/eks/your-cluster-name/app"
              }
            ]
          }
        }
      }
    }

# CloudWatch Agent DaemonSet
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cloudwatch-agent
  namespace: logging
spec:
  selector:
    matchLabels:
      app: cloudwatch-agent
  template:
    metadata:
      labels:
        app: cloudwatch-agent
    spec:
      containers:
        - name: cloudwatch-agent
          image: amazon/cloudwatch-agent:latest
          volumeMounts:
            - name: cwagent-config
              mountPath: /etc/cwagentconfig
          env:
            - name: CW_CONFIG_CONTENT
              valueFrom:
                configMapKeyRef:
                  name: cloudwatch-agent-config
                  key: config.json
      volumes:
        - name: cwagent-config
          configMap:
            name: cloudwatch-agent-config

apiVersion: v1
kind: Namespace
metadata:
  name: logging
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
  labels:
    k8s-app: fluent-bit
  annotations:
    description: Fluent Bit config for EKS to Elasticsearch
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        1
        Log_Level    info
        Parsers_File parsers.conf


    [INPUT]
      Name   tail
      Path   /var/log/containers/*.log
      Tag    kube.*

    [OUTPUT]
        Name  es
        Match *
        Host  elasticsearch-logging.monitoring.svc.cluster.local
        Port  9200
        Index my_app_logs
        Type  _doc
        AWS_Auth On
        AWS_Region us-east-1
        tls On
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: logging
  labels:
    k8s-app: fluent-bit
spec:
  selector:
    matchLabels:
      k8s-app: fluent-bit
  template:
    metadata:
      labels:
        k8s-app: fluent-bit
    spec:
      serviceAccountName: fluent-bit
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:latest
          resources:
            limits:
              memory: 200Mi
            requests:
              cpu: 100m
              memory: 100Mi
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: fluent-bit-config
              mountPath: /fluent-bit/etc/
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: fluent-bit-config
          configMap:
            name: fluent-bit-config
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: logging
---
# Prometheus Operator Helm values (snippet)
prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    scrapeInterval: 30s
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: [ "ReadWriteOnce" ]
          resources:
            requests:
              storage: 20Gi
---
# Grafana Helm values (snippet)
grafana:
  enabled: true
  sidecar:
    dashboards:
      enabled: true
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-server.monitoring.svc.cluster.local
          access: proxy
          isDefault: true
        - name: Elasticsearch
          type: elasticsearch
          url: http://elasticsearch.logging.svc.cluster.local:9200
          access: proxy
          jsonData:
            timeField: '@timestamp'
            esVersion: 7
            logMessageField: message
            logLevelField: level
